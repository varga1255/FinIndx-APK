workflows:
  android-build:
    name: Android APK Build
    max_build_duration: 60
    environment:
      flutter: 3.41.5
    working_directory: financne_indexy
    scripts:
      - name: Over vstupne subory
        script: |
          test -f pubspec.yaml
          test -f lib/main.dart

      - name: Vygeneruj Android projekt
        script: |
          mkdir -p /tmp/financne_indexy_backup
          cp pubspec.yaml /tmp/financne_indexy_backup/pubspec.yaml
          cp lib/main.dart /tmp/financne_indexy_backup/main.dart

          rm -rf android ios linux macos web windows test .dart_tool

          flutter create --platforms=android --project-name financne_indexy .

          cp /tmp/financne_indexy_backup/pubspec.yaml pubspec.yaml
          cp /tmp/financne_indexy_backup/main.dart lib/main.dart

      - name: Pridaj internet permission
        script: |
          if ! grep -q 'android.permission.INTERNET' android/app/src/main/AndroidManifest.xml; then
            perl -0pi -e 's|<manifest[^>]*>|$&\n    <uses-permission android:name="android.permission.INTERNET"/>|' android/app/src/main/AndroidManifest.xml
          fi

      - name: Stiahni zavislosti
        script: flutter pub get

      - name: Zostav release APK
        script: flutter build apk --release

    artifacts:
      - financne_indexy/build/app/outputs/flutter-apk/app-release.apk
